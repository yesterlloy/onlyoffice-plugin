spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:template_editor}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

# OSS 存储配置
oss:
  type: ${OSS_TYPE:aliyun}
  aliyun:
    endpoint: ${OSS_ENDPOINT}
    bucket-name: ${OSS_BUCKET}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    custom-domain: ${OSS_CUSTOM_DOMAIN:}
  local:
    base-path: ${OSS_LOCAL_PATH:./storage}
    api-base-url: ${OSS_LOCAL_URL:http://localhost:8080/template-editor}

# AI 模型配置
ai:
  local:
    base-url: ${AI_BASE_URL}
    api-key: ${AI_API_KEY:}
    default-model: ${AI_DEFAULT_MODEL}
    default-temperature: 0.3
    default-max-tokens: 1000
    timeout:
      connect: 10000
      read: 60000

# OnlyOffice 文档服务器配置
onlyoffice:
  document-server:
    url: ${ONLYOFFICE_DOC_SERVER_URL}
  callback-base-url: ${ONLYOFFICE_CALLBACK_URL}
  jwt-secret: ${ONLYOFFICE_JWT_SECRET}
  jwt-expire-hours: ${ONLYOFFICE_JWT_EXPIRE_HOURS:24}

logging:
  level:
    root: INFO
    com.yl.template: INFO